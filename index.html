<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Victoria Snow Report</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { margin: 0; background: #f4f6f8; color: #16202b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.45; }
.wrap { max-width: 1060px; margin: 0 auto; padding: 18px 18px 48px; }

/* Header */
.head { background: linear-gradient(135deg, #0d3b66 0%, #1b6ca8 100%); color: #fff; border-radius: 14px; padding: 18px 22px; }
.head h1 { margin: 0 0 3px; font-size: 23px; letter-spacing: -0.3px; }
.head .sub { font-size: 13px; opacity: 0.92; }

/* Tabs + update row */
.controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin: 16px 0 6px; }
.tabs { display: inline-flex; flex-wrap: wrap; background: #e7edf3; border-radius: 11px; padding: 4px; gap: 3px; }
.tab { appearance: none; border: 0; background: transparent; color: #45576a; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: background .12s, color .12s; }
.tab:hover { color: #16202b; }
.tab.active { background: #fff; color: #0d3b66; box-shadow: 0 1px 3px rgba(13,59,102,.18); }
.spacer { flex: 1 1 auto; }
.outlookbtn { appearance: none; border: 0; background: #1b6ca8; color: #fff; font-weight: 700; font-size: 13.5px; padding: 9px 15px; border-radius: 9px; cursor: pointer; white-space: nowrap; transition: background .12s; }
.outlookbtn:hover { background: #155a8f; }
.outlookbtn.on { background: #0d3f66; box-shadow: 0 0 0 3px rgba(27,108,168,.28); }
.updbtn { appearance: none; border: 1px solid #1b6ca8; background: #1b6ca8; color: #fff; font-weight: 600; font-size: 13.5px; padding: 9px 16px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
.updbtn:hover { background: #15598c; }
.updbtn:disabled { opacity: .6; cursor: default; }
.updstatus { font-size: 12.5px; color: #51606e; margin: 2px 2px 0; min-height: 16px; }
.updstatus.ok { color: #1d6b2a; }
.updstatus.err { color: #b23b3b; }

/* Stamp + stale */
.stamp { margin-top: 14px; font-size: 12.5px; color: #51606e; }
.stamp strong { color: #16202b; }
#globalstamp { color: #eaf1f8; font-size: 13px; line-height: 1.5; }
#globalstamp strong { color: #ffffff; font-weight: 700; }
.stale { background: #ffe6a8; color: #6a4a00; border-radius: 9px; padding: 9px 13px; font-size: 13px; margin: 12px 0 0; border: 1px solid #f0c64c; }

/* Conditions strip */
.cond { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 14px 0 4px; }
.cbox { background: #fff; border: 1px solid #e3e8ee; border-radius: 11px; padding: 12px 13px; }
.cbox .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7785; font-weight: 700; }
.cbox .val { font-size: 19px; font-weight: 700; margin-top: 3px; color: #0d3b66; line-height: 1.15; }
.cbox .val small { font-size: 12px; color: #6b7785; font-weight: 600; }
.cbox .val.muted { color: #9aa6b2; font-weight: 600; font-size: 15px; }
.condnote { font-size: 12px; color: #6b7785; margin: 8px 2px 0; }
.condnote a { color: #1b6ca8; }

/* Predicted cards */
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; margin: 14px 0; }
.card { background: #fff; border: 1px solid #e3e8ee; border-radius: 11px; padding: 13px 14px; }
.card .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7785; font-weight: 700; }
.card .val { font-size: 21px; font-weight: 700; margin-top: 3px; color: #0d3b66; }
.card .unit { font-size: 12.5px; color: #6b7785; font-weight: 500; }

h2 { font-size: 15px; margin: 20px 0 9px; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e3e8ee; font-size: 13px; }
th { background: #eef2f6; text-align: left; padding: 9px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: #51606e; border-bottom: 1px solid #e3e8ee; }
td { padding: 9px 10px; border-bottom: 1px solid #eef1f4; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.firm td:first-child { border-left: 4px solid #2e8b57; }
tr.low td:first-child { border-left: 4px solid #d6a417; }
tr.low { background: #fcfaf3; }
tr.past td { opacity: 0.45; }
.daycell { font-weight: 600; white-space: nowrap; }
.daycell small { display: block; font-weight: 400; color: #8693a0; font-size: 10.5px; }
.snowcm { font-weight: 700; white-space: nowrap; }
.snowcm.zero { color: #9aa6b2; font-weight: 500; }
.pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.p-high { background: #cdeccd; color: #1d6b2a; }
.p-likely { background: #d9ecfb; color: #155a8a; }
.p-possible { background: #f3e7c6; color: #7a5a08; }
.p-none { background: #eceff2; color: #8693a0; }
.sm { font-size: 12px; white-space: nowrap; }
.sm-likely { color: #155a8a; font-weight: 600; }
.sm-possible { color: #7a5a08; }
.sm-unlikely { color: #9aa6b2; }
.lvl { white-space: normal; }
.lvl.dash { color: #b5bec8; }
.legend { display: flex; flex-wrap: wrap; gap: 15px; margin: 11px 2px 0; font-size: 12px; color: #51606e; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.sw { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }
.foot { margin-top: 22px; font-size: 12px; color: #6b7785; }
.foot a { color: #1b6ca8; }
.foot h3 { font-size: 12.5px; color: #16202b; margin: 14px 0 6px; }
.hidden { display: none; }
/* History tab */
.hwrap { margin-top: 6px; }
.hlead { font-size: 13px; color: #45576a; margin: 4px 2px 12px; }
.hkpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; margin: 10px 0 16px; }
.hkpi { background: #fff; border: 1px solid #e3e8ee; border-radius: 11px; padding: 12px 13px; }
.hkpi .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; color: #6b7785; font-weight: 700; }
.hkpi .val { font-size: 20px; font-weight: 700; margin-top: 3px; color: #0d3b66; line-height: 1.12; }
.hkpi .val small { font-size: 12px; color: #6b7785; font-weight: 600; }
.hcard { background: #fff; border: 1px solid #e3e8ee; border-radius: 12px; padding: 14px 15px; margin: 14px 0; }
.hcard h3 { margin: 0 0 3px; font-size: 14.5px; color: #16202b; }
.hcard .cap { font-size: 12px; color: #6b7785; margin: 0 0 10px; }
.hsvg { width: 100%; height: auto; display: block; }
.hlegend { display: flex; flex-wrap: wrap; gap: 14px; margin: 10px 2px 0; font-size: 12px; color: #51606e; }
.hlegend span { display: inline-flex; align-items: center; gap: 6px; }
.hln { width: 16px; height: 0; border-top: 3px solid; display: inline-block; }
.hgroups { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; margin: 12px 0 6px; }
.hgrp { border: 1px solid #e3e8ee; border-radius: 11px; padding: 12px 13px; }
.hgrp .gname { font-weight: 700; font-size: 13px; }
.hgrp .gmean { font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
.hgrp .gyears { font-size: 11.5px; color: #6b7785; line-height: 1.5; }
.hgrp.en { background: #fbeceb; border-color: #f1c3bf; } .hgrp.en .gname, .hgrp.en .gmean { color: #b23529; }
.hgrp.ln { background: #e9f2fb; border-color: #c3dcf3; } .hgrp.ln .gname, .hgrp.ln .gmean { color: #1f5fa0; }
.hgrp.ne { background: #f1f4f7; border-color: #dde4ea; } .hgrp.ne .gname, .hgrp.ne .gmean { color: #51606e; }
.htable { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 4px; }
.htable th { background: #eef2f6; text-align: left; padding: 7px 9px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .4px; color: #51606e; }
.htable td { padding: 7px 9px; border-bottom: 1px solid #eef1f4; }
.hbadge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.hbadge.en { background: #f4cdc9; color: #93271c; } .hbadge.ln { background: #cfe2f6; color: #18548f; } .hbadge.ne { background: #e4e9ee; color: #5a6772; }
.hnote { background: #eef4fb; border: 1px solid #cfe0f2; border-radius: 10px; padding: 10px 13px; font-size: 12.5px; color: #2a4760; margin: 14px 0; }
.hpending { background: #fff7e6; border: 1px solid #f0d79a; border-radius: 10px; padding: 10px 13px; font-size: 12.5px; color: #6a4a00; margin: 14px 0; }
.hchartwrap { position: relative; }
.hchartwrap2 { position: relative; }
.wbar { cursor: crosshair; }
.wbar:hover { opacity: 0.85; }
.hhit { cursor: crosshair; }
.htip { position: absolute; transform: translate(-50%, -100%); background: #16202b; color: #fff; font-size: 11.5px; line-height: 1.3; padding: 4px 9px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 6; box-shadow: 0 2px 7px rgba(0,0,0,.28); margin-top: -4px; }
.htip[hidden] { display: none; }
.htoggle { display: inline-flex; background: #e7edf3; border-radius: 9px; padding: 3px; gap: 2px; margin: 2px 0 12px; flex-wrap: wrap; }
.htoggle button { appearance: none; border: 0; background: transparent; color: #45576a; font-weight: 600; font-size: 12px; padding: 5px 12px; border-radius: 7px; cursor: pointer; }
.htoggle button.active { background: #fff; color: #0d3b66; box-shadow: 0 1px 2px rgba(13,59,102,.18); }
@media (max-width: 820px){ .hkpis { grid-template-columns: repeat(2,1fr); } .hgroups { grid-template-columns: 1fr; } .cond { grid-template-columns: repeat(3, 1fr); } .cards { grid-template-columns: repeat(2, 1fr); } table { font-size: 12px; } th, td { padding: 8px 7px; } }
@media (max-width: 480px){ .cond { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>

function hDay(mmdd){ const p=mmdd.split('-'); return H_CUM[(+p[0])-1] + (+p[1]); }
function hFmt(mmdd){ const p=mmdd.split('-'); return (+p[1]) + " " + H_MON[(+p[0])-1]; }
function hMMDD(doy){ for(let m=12;m>=1;m--){ if(doy>H_CUM[m-1]) return String(m).padStart(2,'0')+'-'+String(doy-H_CUM[m-1]).padStart(2,'0'); } return "01-01"; }
function hYears(S){ return Object.keys(S).map(Number).sort((a,b)=>a-b); }
function hLatest(S){ return Math.max(...Object.keys(S).map(Number)); }
function hPeak(S,yr){ let mx=-1,md=""; (S[yr]||[]).forEach(([d,v])=>{ if(v>mx){mx=v;md=d;} }); return {cm:mx,date:md}; }
function hCls(yr){ return HENSO[yr]?HENSO[yr].cls:'neutral'; }
const HCOL = {en:"#d6453d", ln:"#2f74c0", neutral:"#9aa6b2"};

function hLineChart(S, SM){
  const yrs=hYears(S), latest=hLatest(S);
  const W=920,H=320,L=42,R=14,T=12,B=30, pw=W-L-R, ph=H-T-B;
  const x0=hDay("06-01"), x1=hDay("10-07");   // clip to the data window (≈Jun–early Oct); no empty May/Nov margin
  let pv=yrs.map(y=>hPeak(S,y).cm); if(SM) Object.keys(SM).forEach(y=>SM[y].forEach(([d,v])=>pv.push(v)));
  const ymax=Math.max(150, Math.ceil(Math.max(...pv)/50)*50);
  const X=d=>L+(d-x0)/(x1-x0)*pw, Y=v=>T+(1-v/ymax)*ph;
  let g="";
  for(let v=0; v<=ymax; v+=50){ g+=`<line x1="${L}" y1="${Y(v).toFixed(1)}" x2="${W-R}" y2="${Y(v).toFixed(1)}" stroke="#eef1f4"/>`+
    `<text x="${L-6}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#9aa6b2">${v}</text>`; }
  [6,7,8,9,10].forEach(m=>{ const d=H_CUM[m-1]+1, xx=X(d); g+=`<line x1="${xx.toFixed(1)}" y1="${T}" x2="${xx.toFixed(1)}" y2="${T+ph}" stroke="#f4f6f8"/>`+
    `<text x="${xx.toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="10" fill="#9aa6b2">${H_MON[m-1]}</text>`; });
  // snow-making series first (behind natural), dashed distinct colour
  if(SM){ Object.keys(SM).forEach(yr=>{ const pts=SM[yr].map(([d,v])=>`${X(hDay(d)).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
    g+=`<polyline class="hline" data-year="SM${yr}" data-op="0.9" points="${pts}" fill="none" stroke="${HSMCOL}" stroke-width="2" opacity="0.9" stroke-dasharray="5 3" stroke-linejoin="round"/>`; }); }
  ["neutral","ln","en"].forEach(cls=>{ yrs.forEach(yr=>{ if(hCls(yr)!==cls) return;
    const pts=S[yr].map(([d,v])=>`${X(hDay(d)).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
    const recent=(yr===latest), sw=recent?3:(cls==="neutral"?1.7:2.4), op=recent?1:(cls==="neutral"?0.72:0.95);
    g+=`<polyline class="hline" data-year="${yr}" data-op="${op}" points="${pts}" fill="none" stroke="${HCOL[cls]}" stroke-width="${sw}" opacity="${op}" stroke-linejoin="round"/>`;
  }); });
  const pkList=yrs.map(yr=>({yr, x:X(hDay(hPeak(S,yr).date)), y:Y(hPeak(S,yr).cm), cls:hCls(yr)})).sort((a,b)=>a.x-b.x);
  let lastX=-99, up=true;
  pkList.forEach(p=>{ let ly=p.y-6; if(p.x-lastX<32){ ly=up?p.y-15:p.y+13; up=!up; } else up=true; lastX=p.x; const recent=(p.yr===latest);
    g+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${recent?3.6:2.4}" fill="${HCOL[p.cls]}"${recent?' stroke="#16202b" stroke-width="1"':''}/>`+
       `<text x="${p.x.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" font-size="${recent?11:9.5}" font-weight="${recent?'800':'700'}" fill="${HCOL[p.cls]}">${p.yr}</text>`; });
  if(SM){ Object.keys(SM).forEach(yr=>{ let mx=-1,md=""; SM[yr].forEach(([d,v])=>{ if(v>mx){mx=v;md=d;} });
    g+=`<text x="${X(hDay(md)).toFixed(1)}" y="${(Y(mx)-6).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${HSMCOL}">${yr}</text>`; }); }
  yrs.forEach(yr=>{ const c=HCOL[hCls(yr)]; S[yr].forEach(([d,v])=>{ g+=`<circle class="hhit" cx="${X(hDay(d)).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="7" fill="transparent" data-y="${yr}" data-disp="${yr}" data-d="${d}" data-v="${v}" data-c="${c}"/>`; }); });
  if(SM){ Object.keys(SM).forEach(yr=>{ SM[yr].forEach(([d,v])=>{ g+=`<circle class="hhit" cx="${X(hDay(d)).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="7" fill="transparent" data-y="SM${yr}" data-disp="${yr}" data-d="${d}" data-v="${v}" data-c="${HSMCOL}" data-sm="1"/>`; }); }); }

function hBarOrder(S,mode){
  const yrs=hYears(S);
  if(mode==="chrono") return yrs.slice().sort((a,b)=>a-b);
  if(mode==="enso"){ const ord={en:0,ln:1,neutral:2}; return yrs.slice().sort((a,b)=> (ord[hCls(a)]-ord[hCls(b)]) || (hPeak(S,b).cm-hPeak(S,a).cm)); }
  return yrs.slice().sort((a,b)=>hPeak(S,b).cm-hPeak(S,a).cm);
}

function hInterp(series, day){
  const pts=series.map(([d,v])=>[hDay(d),v]);
  if(day<pts[0][0] || day>pts[pts.length-1][0]) return null;
  for(let i=1;i<pts.length;i++){ if(day<=pts[i][0]){ const x0=pts[i-1][0],y0=pts[i-1][1],x1=pts[i][0],y1=pts[i][1];
    return x1===x0 ? y1 : y0+(y1-y0)*(day-x0)/(x1-x0); } }
  return pts[pts.length-1][1];
}
function hWeeklyAvg(S){
  const start=hDay("06-01"), end=hDay("10-19"), tot=Object.keys(S).length, need=Math.max(2, Math.ceil(tot/2)); const out=[];
  for(let g=start; g<=end; g+=7){ let s=0,n=0; Object.keys(S).forEach(yr=>{ const v=hInterp(S[yr],g); if(v!=null){ s+=v; n++; } });
    if(n>=need) out.push({day:g, avg:s/n, n}); }
  return out;
}
function hWeeklyStats(S){
  const start=hDay("06-01"), end=hDay("10-19"), tot=Object.keys(S).length, need=Math.max(2, Math.ceil(tot/2)); const out=[];
  for(let g=start; g<=end; g+=7){ const vals=[]; Object.keys(S).forEach(yr=>{ const v=hInterp(S[yr],g); if(v!=null) vals.push(v); });
    if(vals.length>=need){ const mean=vals.reduce((a,b)=>a+b,0)/vals.length; out.push({day:g, min:Math.min(...vals), max:Math.max(...vals), mean, n:vals.length}); } }
  return out;
}
// Candle chart: each week's box spans season min–max, line = mean; green = deepest week; VIC school holidays shaded.

function hWeeklyBar(S, SM){

  const all=data.concat(hasSM?dataSM:[]);
  const days=[...new Set(all.map(d=>d.day))].sort((a,b)=>a-b);
  const idx=Object.fromEntries(days.map((d,i)=>[d,i]));
  const W=920,H=322,L=42,R=14,T=22,B=54,pw=W-L-R,ph=H-T-B;
  const ymax=Math.max(25, Math.ceil(Math.max(...all.map(d=>d.max))/25)*25);
  const gap=pw/days.length, Xi=i=>L+gap*i+gap/2, Y=v=>T+(1-v/ymax)*ph;
  const s0=hDay("06-01"), Xf=f=>L+gap*f+gap/2, clamp=x=>Math.max(L,Math.min(W-R,x));

  if(!_isD && typeof INTERSCHOOLS!=='undefined'){ const _ly = Math.max(...Object.keys(INTERSCHOOLS).map(Number)); if(_ly){ _isD = INTERSCHOOLS[_ly]; _isTBC = true; } }
  const _isRange = _isD ? (hFmt(_isD[0]).split(" ")[0]+"–"+hFmt(_isD[1])) : "";
  const BANDS=[

    {n:"Spring Holidays",dt:"19 Sep – 4 Oct",f1:(hDay("09-19")-s0)/7,f2:(hDay("10-04")-s0)/7,fill:"#cdd8ea",fo:0.5,tc:"#4f668c",dc:"#5f78a0"},
    ...(_isD ? [{n:"Interschools",dt:(_isTBC?"~"+_isRange+" (TBC)":_isRange),f1:(hDay(_isD[0])-s0)/7,f2:(hDay(_isD[1])-s0)/7,fill:"#d9c7f1",fo:0.55,tc:"#6f45a8",dc:"#8a5cd0"}] : [])

    g+=`<rect x="${x1.toFixed(1)}" y="${T}" width="${(x2-x1).toFixed(1)}" height="${ph}" fill="${h.fill}" fill-opacity="${h.fo}"/>`+

  for(let v=0;v<=ymax;v+=25){ g+=`<line x1="${L}" y1="${Y(v).toFixed(1)}" x2="${W-R}" y2="${Y(v).toFixed(1)}" stroke="#eef1f4"/>`+
    `<text x="${L-6}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" font-size="10" fill="#9aa6b2">${v}</text>`; }
  const candle=(d,cx,bw,col,fo,sw,src)=>{ const top=Y(d.max),bot=Y(d.min);
    return `<rect class="wbar" x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,bot-top).toFixed(1)}" rx="2" fill="${col}" fill-opacity="${fo}" stroke="${col}" stroke-width="${sw}" data-l="${hFmt(hMMDD(d.day))}" data-src="${src}" data-min="${d.min.toFixed(0)}" data-mean="${d.mean.toFixed(0)}" data-max="${d.max.toFixed(0)}" data-n="${d.n}"/>`+

function renderOutlook(){
  const sub = 'style="font-weight:400;color:#6b7785;font-size:12px"';
  return `
  <div class="hcard">
    <div style="margin:2px 0 6px"><strong style="font-size:16px">Falls Creek — snow outlook</strong> <span ${sub}>data-based, not a season-by-season forecast</span></div>
    <p class="cap"><strong>Read this first.</strong> No one can skilfully predict a specific winter's snowfall years ahead — the season-to-season swings dwarf any trend (our Falls record runs from a 73 cm peak in 2020 to 209 cm in 2018). What follows is what the numbers and the science genuinely support: a likely range and the direction of travel, not a promise about any one year.</p>
  </div>

  <div class="hcard">
    <h3>This season <span ${sub}>— as at July 2026</span> &nbsp;<span style="background:#fff3e3;border:1px solid #f0c890;color:#c2710f;font-weight:700;font-size:11px;padding:2px 8px;border-radius:20px">Leaning below-average</span></h3>
    <p class="cap">The Bureau of Meteorology has the Pacific in a <strong>strong El Niño</strong>, with a <strong>positive Indian Ocean Dipole</strong> possibly developing through winter–spring. Both tend to make south-east Australia <strong>warmer and drier</strong> — usually poorer snow. In our own record the two El Niño winters (2015, 2023) were among the leanest, peaking at 109 and 94 cm versus a 138 cm average. So the base case for 2026 is a <strong>leaner-than-typical natural season</strong>, cushioned early and late by snow-making. Caveat: a strong Pacific signal doesn't guarantee a strong local impact — it's one driver among several.</p>
  </div>

  <div class="hcard">
    <h3>The Falls baseline <span ${sub}>— 10 natural seasons, 2014–2023 (Alpine Resorts Victoria)</span></h3>
    <p class="cap">Peak depth each season averaged <strong>~138 cm</strong> (median 137), ranging <strong>73 cm (2020) → 209 cm (2018)</strong>, standard deviation ≈ 40 cm. The single biggest lesson is <strong>variability</strong> — the gap between a good and a poor year is far larger than any long-term drift. Split by climate driver: <strong>El Niño ≈ 102 cm</strong>, <strong>La Niña ≈ 119 cm</strong>, <strong>neutral ≈ 176 cm</strong> (small samples, so trust the "El Niño is leanest" part more than the La-Niña-vs-neutral order). Season-by-season detail is on the <em>Buller/Falls history</em> tabs.</p>
  </div>

  <div class="hcard">
    <h3>The next few seasons</h3>
    <p class="cap">Beyond this winter, ENSO and the IOD aren't skilfully predictable, so the honest expectation is just the <strong>historical spread</strong>: most seasons peak roughly <strong>110–165 cm</strong>, with about a 1-in-6 chance of a bumper 190 cm+ year and a similar chance of a poor sub-95 cm one. Expect a couple of average-ish seasons and probably one lean one in any three-to-four-year run. The genuine long-term signal — from the 60-year Spencers Creek record, a far better guide than our short one — is a <strong>gradual decline of ~0.35 cm/yr</strong> and a season that <strong>ends earlier</strong> (late-Sept/early-Oct depths already down 18–30%). Over just a few years that shift is small next to the year-to-year noise.</p>
  </div>

  <div class="hcard">
    <h3>The long game — to 2050</h3>
    <p class="cap">CSIRO projects maximum snow depth at Falls Creek and Mt Hotham falling <strong>30–70% under lower emissions, or 45–90% under higher emissions, by 2050</strong> (relative to a 1990 baseline), with warming trimming the season mainly at its shoulders. The direction is unambiguous even though any single year isn't: deep <em>natural</em> cover becomes rarer and later to arrive, and snow-making does more of the heavy lifting each year — which is exactly what the resort report has been showing this season.</p>
  </div>

  <div class="hcard">
    <h3>The climate drivers, briefly</h3>
    <table style="width:100%;border-collapse:collapse;font-size:12.5px">
      <tr><td style="padding:6px 8px;vertical-align:top;white-space:nowrap"><strong style="color:#1b6ca8">ENSO</strong><br><span ${sub}>Pacific Ocean</span></td>
          <td style="padding:6px 8px;border-bottom:1px solid #eef1f4">The <strong>El Niño–Southern Oscillation</strong> — the Pacific's warm/cool cycle, the biggest single lever on our winters. <strong>El Niño</strong> (warm central/east Pacific) tips SE Australia warmer &amp; drier → generally <strong>poorer snow</strong>. <strong>La Niña</strong> (cool) brings cooler, wetter conditions → often <strong>better snow</strong>, provided it's cold enough to fall as snow not rain. <strong>Neutral</strong> = neither dominates.</td></tr>
      <tr><td style="padding:6px 8px;vertical-align:top;white-space:nowrap"><strong style="color:#1b6ca8">IOD</strong><br><span ${sub}>Indian Ocean</span></td>
          <td style="padding:6px 8px;border-bottom:1px solid #eef1f4">The <strong>Indian Ocean Dipole</strong> — the Indian Ocean's version of ENSO. A <strong>positive IOD</strong> (cool water off north-west Australia) means less moisture fed to the south-east → <strong>drier, poorer snow</strong>; a <strong>negative IOD</strong> does the opposite. It often <strong>compounds El Niño</strong>, as it may this year.</td></tr>
      <tr><td style="padding:6px 8px;vertical-align:top;white-space:nowrap"><strong style="color:#1b6ca8">SAM</strong><br><span ${sub}>Southern Ocean</span></td>
          <td style="padding:6px 8px">The <strong>Southern Annular Mode</strong> — the north–south position of the Southern Ocean storm track. A <strong>negative SAM</strong> in winter drags cold fronts north onto the Alps → <strong>more snow</strong>; a positive SAM pulls them south → drier. It flips week to week, so it mostly governs <strong>individual storms</strong> rather than the whole season.</td></tr>
    </table>
  </div>

  <div class="hcard">
    <h3>Practical takeaways</h3>
    <p class="cap">• <strong>Mid-to-late August (~17–24 Aug)</strong> stays the most reliable deep-snow window — where the historic peak, the school holidays' tail and the Interschools all sit.<br>• Plan around <strong>variability, not averages</strong> — chasing the storms beats betting on a specific season; the difference between a 2018 and a 2020 dwarfs the climate trend.<br>• Expect <strong>snow-making to matter more</strong> every year, especially to open early and hold the season's end.</p>
  </div>

  <p class="cap" style="color:#9aa6b2">Baseline: Alpine Resorts Victoria daily snow-depth records (Falls Creek, 2014–2023). Current drivers: Bureau of Meteorology. Long-term trend &amp; projections: CSIRO (Hennessy et al.) and the Spencers Creek record. This is a climatological outlook, reviewed each season — last updated July 2026.</p>
  `;
}

    ${smBanner}
    <div style="background:#fbeceb;border:1px solid #e9b4ae;border-left:5px solid #d6453d;border-radius:11px;padding:12px 15px;margin:4px 0 14px;font-size:13px;color:#7a2c23">
      <strong style="color:#b23529">2026 season — El Niño underway.</strong> The Pacific is in an <strong>El Niño</strong> state and the major agencies (BoM, NOAA, WMO, IRI) put it ~80% to persist through Jun–Aug 2026, at least moderate. El Niño tends to push south-east Australian winters warmer and drier — historically leaner snow. ${enLine} Treat it as a tilt in the odds, not a forecast.
    </div>
    <div class="hkpis">
      <div class="hkpi"><div class="lbl">Deepest (natural)</div><div class="val">${deepest.cm} cm <small>${deepest.y}</small></div></div>
      <div class="hkpi"><div class="lbl">Leanest (natural)</div><div class="val">${leanest.cm} cm <small>${leanest.y}</small></div></div>
      <div class="hkpi"><div class="lbl">Median peak</div><div class="val">${med} cm</div></div>
      <div class="hkpi"><div class="lbl">Base now</div><div class="val">${base} <small>24 Jun, pre-season</small></div></div>
    </div>
    <div class="hcard">
      <h3>Weekly snow depth — ${yrs.length} natural season${yrs.length>1?'s':''}${SM?` + snow-making`:''} overlaid</h3>
      <p class="cap">Each solid line is one season's on-ground natural depth, coloured by ENSO state.${SM?` <strong style="color:#c2710f">Orange dashed lines are snow-making-area depth</strong> for the later years where natural readings stopped.`:''} <strong>Hover any line</strong> to read its year, date and depth.</p>
      <div class="hchartwrap">${hLineChart(S, SM)}<div class="htip" id="htip" hidden></div></div>
      <div class="hlegend">
        <span><i class="hln" style="border-color:#d6453d"></i> El Niño</span>
        <span><i class="hln" style="border-color:#2f74c0"></i> La Niña</span>
        <span><i class="hln" style="border-color:#9aa6b2"></i> Neutral</span>
        ${SM?`<span><i class="hln" style="border-color:#e8821e;border-top-style:dashed"></i> Snow-making area (not natural)</span>`:''}
        <span><strong>${maxY}</strong> bold (most recent natural)</span>
      </div>
    </div>
    <div class="hcard">
      <h3>Snow depth by week of season <span style="font-weight:400;color:#6b7785;font-size:12px">— min · mean · max, ${yrs.length} natural seasons</span></h3>
      <p class="cap">Each candle covers one week of the season. The box spans the <strong>shallowest to deepest</strong> that week has been across ${meta.name}'s ${minY}–${maxY} natural seasons — its <strong>minimum</strong> and <strong>maximum</strong> — and the heavy line is the <strong>average</strong>. A tall box means a week that swings wildly year to year; a short box is dependable. The <strong style="color:#2e8b57">green</strong> candle is the historically deepest week. The <strong style="color:#4f668c">shaded blue bands</strong> are the <strong>private school</strong> holidays (winter 27 Jun – 20 Jul, spring 19 Sep – 4 Oct). The <strong style="color:#6f45a8">violet band</strong> is the <strong>Victorian Interschools</strong> championships at Mt Buller — shown for the current year (it floats year to year but always lands mid-to-late August, right on the historically deepest snow). Hover any week for its min, mean and max.${SM?' The <strong style="color:#c2710f">orange</strong> candles are Hotham\'s snow-making-area seasons (2018–2023) — a different, machine-assisted measurement shown beside the natural ones.':''}</p>
      <div class="hchartwrap2">${hWeeklyBar(S, SM)}<div class="htip" id="htip2" hidden></div></div>
    </div>
    <div class="hcard">
      <h3>Peak snow depth by season <span style="font-weight:400;color:#6b7785;font-size:12px">— natural depth</span></h3>
      <p class="cap">Deepest weekly mean each natural season. Bar colour = ENSO state. Switch the ordering below. Recent seasons ARV hasn’t published yet appear as “no data”.</p>
      <div class="htoggle" id="hbartoggle">
        <button data-mode="depth" class="active">By depth</button>
        <button data-mode="chrono">Chronological</button>
        <button data-mode="enso">By El Niño / La Niña</button>
      </div>
      <div id="hbar">${hBarChart(S,"depth",H_MISS_ACTIVE)}</div>
    </div>
    <div class="hcard">
      <h3>El Niño / La Niña vs season quality <span style="font-weight:400;color:#6b7785;font-size:12px">— natural depth</span></h3>
      <p class="cap">Mean peak natural depth grouped by winter ENSO state (small samples — tendency, not rule).</p>
      <div class="hgroups">
        <div class="hgrp en"><div class="gname">El Niño</div><div class="gmean">${enMean!=null?enMean+' cm':'—'}</div><div class="gyears">${grp.en.map(p=>p.y+' ('+p.cm+')').join('<br>')||'—'}</div></div>
        <div class="hgrp ln"><div class="gname">La Niña</div><div class="gmean">${lnMean!=null?lnMean+' cm':'—'}</div><div class="gyears">${grp.ln.map(p=>p.y+' ('+p.cm+')').join('<br>')||'—'}</div></div>
        <div class="hgrp ne"><div class="gname">Neutral</div><div class="gmean">${neMean!=null?neMean+' cm':'—'}</div><div class="gyears">${grp.neutral.map(p=>p.y+' ('+p.cm+')').join('<br>')||'—'}</div></div>
      </div>
      <div class="hnote"><strong>The honest read.</strong> Across natural seasons ${minY}–${maxY}: deepest ${deepest.y} (${deepest.cm} cm), leanest ${leanest.y} (${leanest.cm} cm), median ${med} cm. Group means — El Niño ${enMean!=null?enMean+' cm':'n/a'} (n=${grp.en.length}), La Niña ${lnMean!=null?lnMean+' cm':'n/a'} (n=${grp.ln.length}), neutral ${neMean!=null?neMean+' cm':'n/a'} (n=${grp.neutral.length}). Small samples — read as a tendency only. These are on-ground <em>natural</em> depths at the resort (snow-making excluded), so they sit below high-altitude benchmarks like Spencers Creek.</div>
    </div>
    <div class="hcard">
      <h3>Season-by-season</h3>
      <table class="htable"><thead><tr><th>Season</th><th>Peak depth</th><th>Peaked</th><th>Winter ENSO</th><th>ONI (JJA)</th></tr></thead><tbody>${rows}${smRows}${missRows}</tbody></table>
    </div>
    <div class="hcard">
      <h3>What are El Niño &amp; La Niña?</h3>
      <p class="cap" style="margin-bottom:8px">They're the two opposite phases of a natural Pacific Ocean–atmosphere cycle (ENSO), tracked by sea-surface temperature in the central tropical Pacific (the Oceanic Niño Index).</p>
      <table class="htable"><tbody>
        <tr><td style="white-space:nowrap"><span class="hbadge en">El Niño</span></td><td>Central/eastern Pacific <strong>warmer</strong> than average. For south-east Australia it tends to push winters <strong>warmer and drier</strong> — often poorer snow.</td></tr>
        <tr><td style="white-space:nowrap"><span class="hbadge ln">La Niña</span></td><td>That same region <strong>cooler</strong> than average. Tends to bring <strong>cooler, wetter</strong> conditions — often better snow, provided it's cold enough to fall as snow rather than rain.</td></tr>
        <tr><td style="white-space:nowrap"><span class="hbadge ne">Neutral</span></td><td>Neither phase — the Pacific sits near its long-term average and other weather drivers dominate.</td></tr>
      </tbody></table>
    </div>
    <div class="foot">
      <h3>Sources &amp; method</h3>
      <p>Snow depth: <a href="https://www.alpineresorts.vic.gov.au/the-resorts/visitation-statistics/snow-depth-datasets2" target="_blank" rel="noopener">Alpine Resorts Victoria — daily snow-depth records</a> (CC-BY), ${meta.name}'s own on-mountain measurements. Natural depth plotted as the weekly mean of daily natural readings (snow-making excluded).${SM?' Snow-making-area depth (orange dashed) is ARV\'s separate machine-area probe figure for years where natural depth was no longer reported.':''} ENSO: <a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/ensostuff/ONI_v5.php" target="_blank" rel="noopener">NOAA CPC Oceanic Niño Index</a> (austral-winter JJA).</p>
      <p>"Peak depth" is the deepest weekly mean each season. Natural coverage: ${meta.name} ${minY}–${maxY}. Source file: ${meta.file}.</p>
    </div>
  </div>`;
}

function wireHistoryHover(){
  const wrap = document.querySelector('.hchartwrap');
  if(!wrap) return;
  const svg = wrap.querySelector('svg'), tip = document.getElementById('htip'), focus = wrap.querySelector('#hfocus');
  if(!svg || !tip || !focus) return;
  const lines = [...svg.querySelectorAll('.hline')];
  function show(t){
    const key=t.getAttribute('data-y'), disp=t.getAttribute('data-disp')||key, d=t.getAttribute('data-d'), v=t.getAttribute('data-v'), c=t.getAttribute('data-c'), sm=t.getAttribute('data-sm');
    focus.setAttribute('cx', t.getAttribute('cx')); focus.setAttribute('cy', t.getAttribute('cy'));
    focus.setAttribute('fill', c); focus.setAttribute('opacity','1');
    lines.forEach(l=>{ l.style.opacity = (l.getAttribute('data-year')===key) ? '1' : '0.12'; });
    tip.innerHTML = '<b>'+disp+'</b> · '+hFmt(d)+' · <b>'+v+' cm</b>'+(sm?' · snow-making area':'');
    tip.hidden = false;
    const r=t.getBoundingClientRect(), w=wrap.getBoundingClientRect();
    tip.style.left = (r.left - w.left + r.width/2) + 'px';
    tip.style.top  = (r.top - w.top) + 'px';
  }
  function hide(){ tip.hidden = true; focus.setAttribute('opacity','0'); lines.forEach(l=> l.style.opacity = l.getAttribute('data-op')); }
  svg.addEventListener('pointerover', e=>{ const t=e.target; if(t && t.classList && t.classList.contains('hhit')) show(t); });
  svg.addEventListener('pointerout',  e=>{ const t=e.target; if(t && t.classList && t.classList.contains('hhit')) hide(); });
}
function wireWeeklyHover(){
  const wrap=document.querySelector('.hchartwrap2'); if(!wrap) return;
  const svg=wrap.querySelector('svg'), tip=document.getElementById('htip2'); if(!svg||!tip) return;
  svg.addEventListener('pointerover', e=>{ const t=e.target; if(!t.classList||!t.classList.contains('wbar')) return;
    tip.innerHTML='<b>'+t.getAttribute('data-l')+'</b> · '+t.getAttribute('data-src')+' · '+t.getAttribute('data-n')+' seasons<br>min <b>'+t.getAttribute('data-min')+'</b> · mean <b>'+t.getAttribute('data-mean')+'</b> · max <b>'+t.getAttribute('data-max')+'</b> cm';
    tip.hidden=false; const r=t.getBoundingClientRect(), w=wrap.getBoundingClientRect();
    tip.style.left=(r.left-w.left+r.width/2)+'px'; tip.style.top=(r.top-w.top)+'px'; });
  svg.addEventListener('pointerout', e=>{ const t=e.target; if(t.classList&&t.classList.contains('wbar')) tip.hidden=true; });
}
function wireBarToggle(){
  const tg = document.getElementById("hbartoggle"); if(!tg) return;
  tg.addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    tg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    const host = document.getElementById("hbar");
    if(host && H_ACTIVE) host.innerHTML = hBarChart(H_ACTIVE, b.dataset.mode, H_MISS_ACTIVE);
  });
}

const pill = {high:["p-high","High"], likely:["p-likely","Likely"], possible:["p-possible","Possible"], none:["p-none","None"]};
const smkClass = {likely:"sm-likely", possible:"sm-possible", unlikely:"sm-unlikely"};
const smkLabel = {likely:"Likely", possible:"Possible", unlikely:"Unlikely"};

function condStrip(c){
  const muted = (v)=> (v==="—") ? ' muted' : '';
  return `
  <div class="cond">
    <div class="cbox"><div class="lbl">Base depth</div><div class="val${muted(c.base)}">${c.base}</div></div>
    <div class="cbox"><div class="lbl">New (24 h)</div><div class="val${muted(c.last24)}">${c.last24}</div></div>
    <div class="cbox"><div class="lbl">New (7 d)</div><div class="val${muted(c.last7)}">${c.last7}</div></div>
    <div class="cbox"><div class="lbl">Season to date</div><div class="val${muted(c.season)}">${c.season}</div></div>
    <div class="cbox"><div class="lbl">Lifts open</div><div class="val${muted(c.lifts)}">${c.lifts}</div></div>
    <div class="cbox"><div class="lbl">Snowmaking</div><div class="val" style="font-size:15px">${c.snowmaking}</div></div>
  </div>
  <div class="condnote">${c.note} &nbsp;·&nbsp; Source: <a href="${c.sourceUrl}" target="_blank" rel="noopener">${c.source}</a>${c.asAt?` (as at ${c.asAt}${c.depthAsAt?`, depth ${c.depthAsAt}`:''})`:''}.</div>`;
}

function render(key){
  var _cb=document.getElementById("cmpbox");   // comparison strip: forecast tabs only, per mountain
  if(_cb){ var _c = (typeof CMP!=='undefined' && CMP && CMP[key]) ? CMP[key] : null; _cb.innerHTML = _c ? cmpRender(_c, (M[key]&&M[key].name)||'') : ''; _cb.style.display = _cb.innerHTML ? '' : 'none'; }
  if(key==='outlook'){ document.getElementById("panel").innerHTML = renderOutlook(); return; }
  if(key.slice(-2)==='-h'){ document.getElementById("panel").innerHTML = renderHistory(key.slice(0,-2)); wireHistoryHover(); wireWeeklyHover(); wireBarToggle(); return; }
  const m = M[key];
  const stale = m.stale ? `<div class="stale">⚠ ${m.staleNote}</div>` : '';
  // Always start the table at TODAY (live local date) — drop elapsed days, for every mountain.
  const _today = new Date(); _today.setHours(0,0,0,0);
  const _MON = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const _dayDate = (ds)=>{ const p=String(ds).trim().split(/\s+/); let dt=new Date(_today.getFullYear(), _MON[p[2]], parseInt(p[1],10)); if((dt-_today)/86400000 < -180){ dt=new Date(_today.getFullYear()+1, _MON[p[2]], parseInt(p[1],10)); } return dt; };
  let _days = m.days.filter(r=> _dayDate(r.d) >= _today).slice(0,14);
  if(!_days.length) _days = m.days.slice(0,14); // safety: never blank the table
  const rows = _days.map(r=>{
    const p = pill[r.lk];
    const z = r.cm.trim().startsWith("0 cm") || r.cm.trim()==="0–1 cm" ? " " : "";
    const zero = (r.cm.trim()==="0 cm") ? " zero" : "";
    const ld = r.lvl === "—" ? " dash" : "";
    const sc = smkClass[r.smk] || "";
    const sl = smkLabel[r.smk] || r.smk;
    return `<tr class="${r.conf}${r.past?' past':''}">
      <td class="daycell">${r.d}<small>${r.past?'past':(r.conf==="firm"?"firm":"outlook")}</small></td>
      <td style="font-size:15px;white-space:nowrap;letter-spacing:1px">${r.c}</td>
      <td class="snowcm${zero}">${r.cm}</td>
      <td class="lvl${ld}">${r.lvl}</td>
      <td><span class="pill ${p[0]}">${p[1]}</span></td>
      <td class="sm ${sc}">${sl}</td>
      <td>${r.w}</td>
    </tr>`;
  }).join("");

  document.getElementById("panel").innerHTML = `
    <div style="margin:6px 2px 0"><strong style="font-size:15px">${m.name}</strong> <span style="color:#6b7785;font-size:13px">— ${m.sub}</span></div>
    <div class="stamp" style="margin-top:4px;color:#51606e">Snowatch forecast issued: <strong>${m.issued}</strong> &nbsp;|&nbsp; Live temp ${m.liveTemp}</div>
    ${stale}
    ${condStrip(m.cond)}
    <div class="cards">
      <div class="card"><div class="lbl">Live temp</div><div class="val">${m.liveTemp}</div></div>
      <div class="card"><div class="lbl">Next 5 days</div><div class="val">${m.p5.replace(' cm','')}<span class="unit"> cm</span></div></div>
      <div class="card"><div class="lbl">Next 10 days</div><div class="val">${m.p10.replace(' cm','')}<span class="unit"> cm</span></div></div>
      <div class="card"><div class="lbl">Next 15 days</div><div class="val">${m.p15.replace(' cm','')}<span class="unit"> cm</span></div></div>
    </div>
    <h2>14-day forecast</h2>
    <table>
      <thead><tr><th>Day</th><th>Conditions (AM › Mid › Night)</th><th>Snow</th><th>Snow level</th><th>Likelihood</th><th>Snowmaking</th><th>Wind</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="legend">
      <span><i class="sw" style="background:#2e8b57"></i> Days 1–7: firm confidence</span>
      <span><i class="sw" style="background:#d6a417"></i> Days 8–14: outlook only</span>
      <span><i class="pill p-likely">Likely</i> snow expected</span>
      <span><i class="pill p-possible">Possible</i> chance only</span>
    </div>
    <div class="foot">
      <h3>Sources &amp; method</h3>
      <p>Forecast: <a href="https://www.snowatch.com.au/15-day-forecasts/${key==='buller'?'mt-buller':key}/" target="_blank" rel="noopener">Snowatch</a> (Pete "The Frog" Taylor; temp &amp; model data from the <a href="http://www.bom.gov.au/" target="_blank" rel="noopener">BOM</a>). Current conditions: official resort report where auto-readable, otherwise linked above.</p>
      <p><strong>Likelihood</strong> graded from Snowatch wording, not invented percentages: <em>High</em> = sustained snow 5 cm+; <em>Likely</em> = light-snow with measurable cm; <em>Possible</em> = "chance"/trace; <em>None</em> = fine/cloudy, 0 cm. <strong>Snowmaking</strong> is Snowatch's daily call (temp/humidity window), not a guarantee guns run. Days 1–7 reliable; 8–15 indicative direction only.</p>
    </div>`;
}

// Tabs
document.getElementById("tabs").addEventListener("click", (e)=>{
  const btn = e.target.closest(".tab");
  if(!btn) return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  var _ob=document.getElementById("outlookbtn"); if(_ob) _ob.classList.remove("on");
  btn.classList.add("active");
  render(btn.dataset.m);
  try { localStorage.setItem("vicSnowTab", btn.dataset.m); } catch(_){}
});
document.getElementById("outlookbtn").addEventListener("click", ()=>{
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("outlookbtn").classList.add("on");
  render("outlook");
  try { localStorage.setItem("vicSnowTab","outlook"); } catch(_){}
});

// ---- Update button (Cowork only) ----
const TASK_ID = "vic-snow-report-nightly";

document.getElementById("updbtn").addEventListener("click", async ()=>{
  const btn = document.getElementById("updbtn");
  const st = document.getElementById("updstatus");
  st.className = "updstatus";
  if(!(window.cowork && typeof window.cowork.runScheduledTask === "function")){
    st.classList.add("err");
    st.textContent = "Live update runs only in the Cowork desktop app. This public page refreshes when the site is redeployed (nightly).";
    return;
  }
  btn.disabled = true;
  st.textContent = "Fetching fresh data… reload in a few minutes.";
  try { await window.cowork.runScheduledTask(TASK_ID); setTimeout(()=>location.reload(), 1500); }
  catch (err) { st.classList.add("err"); st.textContent = "Couldn't start the update: " + (err && err.message ? err.message : err); btn.disabled = false; }
});

// Init — hide the in-app Update button on the public web build
(function(){
  const hasCowork = !!(window.cowork && typeof window.cowork.runScheduledTask === "function");
  const gs = document.getElementById("globalstamp"), ub = document.getElementById("updbtn");
  if(hasCowork){ gs.innerHTML = `Snapshot built <strong>${BUILT}</strong> · refreshes nightly 6 AM, or tap “Update now”.`; }
  else { if(ub) ub.style.display = "none"; gs.innerHTML = `Snapshot built <strong>${BUILT}</strong> · refreshes daily. Source: Snowatch / BOM.`; }
})();
let initTab = "falls";
try { const saved = localStorage.getItem("vicSnowTab"); if(saved && (M[saved] || /-h$/.test(saved) || saved==='outlook')) initTab = saved; } catch(_){}
document.querySelectorAll(".tab").forEach(t=>{ t.classList.toggle("active", t.dataset.m===initTab); });
if(initTab==='outlook'){ var _ob=document.getElementById("outlookbtn"); if(_ob) _ob.classList.add("on"); }
render(initTab);

function cmpRender(c, name){
  const cell = d => '<div style="flex:1;min-width:44px;text-align:center;padding:5px 2px;border-right:1px solid #eef1f4">'
    + '<div style="font-size:10px;color:#6b7785;font-weight:600">'+d.label+'</div>'
    + '<div style="font-size:11.5px;font-weight:700;color:#1b6ca8;margin-top:3px">'+d.sw+'</div>'
    + '<div style="font-size:11.5px;font-weight:700;color:#c2710f">'+d.mw+' cm</div></div>';
  return '<div style="background:#fff;border:1px solid #e3e8ee;border-radius:12px;padding:12px 14px;margin:0 0 14px">'
    + '<div style="font-weight:700;font-size:14px;color:#16202b">'+(name||'')+' — next 7 days: Snowatch vs Mountainwatch</div>'
    + '<div style="font-size:12px;color:#6b7785;margin:2px 0 8px"><b style="color:#1b6ca8">Snowatch</b> (resort level) vs <b style="color:#c2710f">Mountainwatch</b> (upper '+(c.elev||'')+' m). Mountainwatch reads higher because it measures higher up — not necessarily more accurate.</div>'
    + '<div style="display:flex;border:1px solid #eef1f4;border-radius:8px;overflow-x:auto;-webkit-overflow-scrolling:touch">'+c.days.map(cell).join("")+'</div>'
    + '<div style="font-size:12px;color:#51606e;margin-top:8px">Mountainwatch 7-day total: <b style="color:#c2710f">'+c.mw7+' cm</b> @'+(c.elev||'1770')+' m. <span style="color:#9aa6b2">A running accuracy comparison vs actual snowfall is building over the coming fortnight.</span></div></div>';
}
</script>
