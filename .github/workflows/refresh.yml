name: Refresh snow forecast

on:
  schedule:
    - cron: "30 20 * * *"   # 06:30 AEST
    - cron: "30 22 * * *"   # 08:30 AEST
    - cron: "0 1 * * *"     # 11:00 AEST (catches a late Snowatch update)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Rebuild forecast + comparison + tracker log
        run: node scripts/build.mjs
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html data/)" ]; then
            git config user.name "snow-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html data/
            git commit -m "Auto-refresh snow forecast + tracker ($(TZ=Australia/Melbourne date '+%Y-%m-%d %H:%M %Z'))"
            git push
            echo "Pushed an update."
          else
            echo "No change this run."
          fi
